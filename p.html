<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iTapNFC</title>
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/png" href="assets/favicon-32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #09090b;
        --card: #111827;
        --border: #1f2937;
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-faint: #4b5563;
        --radius: 16px;
      }
      [data-theme="light"] {
        --bg: #f9fafb;
        --card: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --text-muted: #6b7280;
        --text-faint: #9ca3af;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      .page {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Space Grotesk", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        background-size: cover;
        background-position: center;
      }

      .biz-name {
        font-family: "Space Grotesk", sans-serif;
        font-size: 18px;
        font-weight: 700;
      }

      .powered {
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 2px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
      }

      .row .k {
        color: var(--text-muted);
        font-size: 12px;
      }
      .row .v {
        font-weight: 600;
      }

      .cta {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        margin-top: 4px;
        text-decoration: none;
        display: block;
        text-align: center;
      }

      .desc {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
        text-align: center;
      }

      .stars {
        display: flex;
        justify-content: center;
        gap: 4px;
      }

      .stars svg {
        width: 28px;
        height: 28px;
      }

      .socials {
        display: flex;
        justify-content: center;
        gap: 12px;
      }

      .social-btn {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--text);
      }

      .social-btn svg {
        width: 18px;
        height: 18px;
      }

      .secure {
        text-align: center;
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--text-faint);
        margin-top: 4px;
      }

      .loading {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        padding: 60px 0;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: #6d5cff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        text-align: center;
        padding: 60px 0;
      }

      .error h2 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      .error p {
        color: var(--text-muted);
        font-size: 14px;
      }

      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #1f2937;
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        transition: transform 0.25s ease;
        z-index: 999;
        white-space: nowrap;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="page" id="page">
      <div class="loading">
        <div class="spinner"></div>
        Loading...
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const API_URL = "https://itapnfc-tech-backend.onrender.com";

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2200);
      }

      function initials(name) {
        if (!name) return "?";
        return name
          .trim()
          .split(/\s+/)
          .slice(0, 2)
          .map((w) => w[0].toUpperCase())
          .join("");
      }

      function gradStyle(theme) {
        return `background: linear-gradient(135deg, ${theme}, #3FD6C9);`;
      }

      function avatarHtml(product) {
        if (product.logoUrl) {
          return `<div class="avatar" style="background-image:url(${product.logoUrl});background-size:cover;background-position:center;"></div>`;
        }
        return `<div class="avatar" style="background:${product.themeColor || "#6D5CFF"};">${initials(product.name)}</div>`;
      }

      function renderProduct(product) {
        const fields = product.fields || {};
        const theme = product.themeColor || "#6D5CFF";
        const grad = gradStyle(theme);
        const name = product.name || "Business";

        let body = "";

        if (product.type === "PAYMENT") {
          body = `
        <p class="desc">Copy the account number and paste it into your bank app to complete payment.</p>
        <div class="row"><span class="k">Bank</span><span class="v">${fields.bankName || "—"}</span></div>
        <div class="row"><span class="k">Account No.</span><span class="v">${fields.accountNumber || "—"}</span></div>
        <div class="row"><span class="k">Account Name</span><span class="v">${fields.accountName || "—"}</span></div>
        <button class="cta" style="${grad}" onclick="copyAccount('${fields.accountNumber || ""}')">Copy Account Number</button>
      `;
        } else if (product.type === "DONATION") {
          body = `
        <p class="desc">Support us with your generous donation.</p>
        <div class="row"><span class="k">Bank</span><span class="v">${fields.bankName || "—"}</span></div>
        <div class="row"><span class="k">Account No.</span><span class="v">${fields.accountNumber || "—"}</span></div>
        <div class="row"><span class="k">Account Name</span><span class="v">${fields.accountName || "—"}</span></div>
        <button class="cta" style="${grad}" onclick="copyAccount('${fields.accountNumber || ""}')">Give Now</button>
      `;
        } else if (product.type === "REVIEW") {
          body = `
        <div class="stars">
          ${'<svg viewBox="0 0 24 24" fill="' + theme + '" stroke="none"><path d="M12 2l3 6 6.5.9-4.7 4.6 1.1 6.4-5.9-3.1-5.9 3.1 1.1-6.4L2 8.9 8.5 8z"/></svg>'.repeat(5)}
        </div>
        <p class="desc">Loved your experience? Leave us a review — it means the world to us.</p>
        <a class="cta" style="${grad}" href="${fields.googleReviewUrl || "#"}" target="_blank" rel="noopener">Leave a Google Review</a>
      `;
        } else if (product.type === "MENU") {
          body = `
        <p class="desc">Tap below to browse our full menu.</p>
        <a class="cta" style="${grad}" href="${fields.website || "#"}" target="_blank" rel="noopener">View Full Menu</a>
        ${fields.whatsapp ? `<a class="cta" style="background:var(--bg);border:1px solid var(--border);color:var(--text);" href="https://wa.me/${fields.whatsapp.replace(/\D/g, "")}" target="_blank">Order on WhatsApp</a>` : ""}
      `;
        } else if (product.type === "CARD") {
          body = `
        <p class="desc">${fields.whatsapp || ""}</p>
        <div class="socials">
          ${fields.whatsapp ? `<a class="social-btn" href="https://wa.me/${fields.whatsapp.replace(/\D/g, "")}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13a11 11 0 0 1 14 0"/></svg></a>` : ""}
          ${fields.instagram ? `<a class="social-btn" href="https://instagram.com/${fields.instagram.replace("@", "")}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="4"/></svg></a>` : ""}
          ${fields.facebook ? `<a class="social-btn" href="https://facebook.com/${fields.facebook}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>` : ""}
          ${fields.website ? `<a class="social-btn" href="${fields.website}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg></a>` : ""}
        </div>
        <button class="cta" style="${grad}" onclick="saveContact()">Save Contact</button>
      `;
        } else if (product.type === "ATTENDANCE") {
          body = `
        <p class="desc">Tap the button below to clock in.</p>
        <button class="cta" style="${grad}" onclick="clockIn()">Clock In</button>
      `;
        } else if (product.type === "VISITOR") {
          body = `
        <p class="desc">Please fill in your details to sign in.</p>
        <input type="text" id="visitorName" placeholder="Your name" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;">
        <input type="text" id="visitorHost" placeholder="Who are you visiting?" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;">
        <button class="cta" style="${grad}" onclick="visitorSignIn()">Sign In</button>
      `;
        } else if (product.type === "ASSET") {
          body = `
        <p class="desc">This asset is tracked by iTapNFC.</p>
        <div class="row"><span class="k">Asset</span><span class="v">${product.name}</span></div>
        <button class="cta" style="${grad}" onclick="showToast('Tap logged successfully')">Log Tap</button>
      `;
        }

        document.getElementById("page").innerHTML = `
      <div class="header">
        ${avatarHtml(product)}
        <div>
          <div class="biz-name">${name}</div>
          <div class="powered">Powered by iTapNFC</div>
        </div>
      </div>
      <div class="card">${body}</div>
      <div class="secure">SECURED BY ITAPNFC</div>
    `;
      }

      function copyAccount(number) {
        if (!number) return showToast("No account number found");
        navigator.clipboard
          .writeText(number)
          .then(() => showToast("Account number copied!"));
      }

      function saveContact() {
        showToast("Contact saved!");
      }

      function clockIn() {
        showToast("Clocked in successfully!");
      }

      function visitorSignIn() {
        const name = document.getElementById("visitorName")?.value.trim();
        const host = document.getElementById("visitorHost")?.value.trim();
        if (!name) return showToast("Please enter your name");
        showToast(`Welcome, ${name}!`);
      }

      // Get slug from URL: /p/grace-bistro-abc12
      async function init() {
        const slug = window.location.pathname.split("/p/")[1];

        if (!slug) {
          document.getElementById("page").innerHTML = `
        <div class="error"><h2>Page not found</h2><p>This link doesn't point to a valid product.</p></div>
      `;
          return;
        }

        try {
          const response = await fetch(`${API_URL}/api/p/${slug}`);
          const data = await response.json();

          if (!response.ok || !data.product) {
            document.getElementById("page").innerHTML = `
          <div class="error"><h2>Page not found</h2><p>This product may have been removed or the link is invalid.</p></div>
        `;
            return;
          }

          // update page title
          document.title = `${data.product.name} — iTapNFC`;

          renderProduct(data.product);
        } catch (err) {
          document.getElementById("page").innerHTML = `
        <div class="error"><h2>Something went wrong</h2><p>Please try again later.</p></div>
      `;
        }
      }

      init();
    </script>
  </body>
</html>
