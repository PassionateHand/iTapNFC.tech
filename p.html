<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iTapNFC</title>
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/png" href="assets/favicon-32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #09090b;
        --card: #111827;
        --border: #1f2937;
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-faint: #4b5563;
        --radius: 16px;
      }
      [data-theme="light"] {
        --bg: #f9fafb;
        --card: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --text-muted: #6b7280;
        --text-faint: #9ca3af;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      .page {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Space Grotesk", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        background-size: cover;
        background-position: center;
      }

      .biz-name {
        font-family: "Space Grotesk", sans-serif;
        font-size: 18px;
        font-weight: 700;
      }

      .powered {
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 2px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
      }

      .row .k {
        color: var(--text-muted);
        font-size: 12px;
      }
      .row .v {
        font-weight: 600;
      }

      .cta {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        margin-top: 4px;
        text-decoration: none;
        display: block;
        text-align: center;
      }

      .desc {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
        text-align: center;
      }

      .stars {
        display: flex;
        justify-content: center;
        gap: 4px;
      }

      .stars svg {
        width: 28px;
        height: 28px;
      }

      .socials {
        display: flex;
        justify-content: center;
        gap: 12px;
      }

      .social-btn {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--text);
      }

      .social-btn svg {
        width: 18px;
        height: 18px;
      }

      .secure {
        text-align: center;
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--text-faint);
        margin-top: 4px;
      }

      .loading {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        padding: 60px 0;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: #6d5cff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        text-align: center;
        padding: 60px 0;
      }

      .error h2 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      .error p {
        color: var(--text-muted);
        font-size: 14px;
      }

      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #1f2937;
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        transition: transform 0.25s ease;
        z-index: 999;
        white-space: nowrap;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="page" id="page">
      <div class="loading">
        <div class="spinner"></div>
        Loading...
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="p.js" type="module"></script>
    <script src="product-renderer.js" type="module"></script>
  </body>
</html>
